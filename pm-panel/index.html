<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM Panel</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="panel" data-tauri-drag-region>
      <header class="panel-header">
        <h1 id="project-title" class="project-title">—</h1>
      </header>
      <div class="panel-body">
      <p id="error" class="error" aria-live="polite"></p>
      <div id="content" class="content" hidden>
        <details id="details" class="project-details">
          <summary class="details-summary">Project details</summary>
          <div class="details-inner">
            <div id="summary-block" class="block"></div>
            <div id="problem-block" class="block"></div>
            <div id="goals-block" class="block"></div>
            <div id="approach-block" class="block"></div>
            <div id="links-block" class="block"></div>
            <div id="learnings-block" class="block"></div>
          </div>
        </details>
        <div id="todos-block" class="block"></div>
      </div>
      </div>
      <div id="resize-grip" class="resize-grip" title="Double-click to fit the panel to its content" aria-label="Resize grip — double-click to fit height"></div>
    </main>
  </body>
</html>
